version: '3.8'

services:
  consul:
    image: consul:1.16
    container_name: ecommerce-consul
    ports:
      - "8500:8500"    # Web UI
      - "8600:8600/udp" # DNS
    command: consul agent -server -ui -node=server-1 -bootstrap-expect=1 -client=0.0.0.0
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge